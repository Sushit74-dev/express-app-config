apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: express-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Sushit74-dev/express-app-config.git
    targetRevision: HEAD
    path: express-app   # 👈 IMPORTANT (your Helm folder)

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true